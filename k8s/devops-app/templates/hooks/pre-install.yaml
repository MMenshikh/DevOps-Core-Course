apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-app.fullname" . }}-preinstall"
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: preinstall
          image: busybox
          command: ["sh", "-c", "echo Pre-install && sleep 5"]