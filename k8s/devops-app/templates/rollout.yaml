apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: devops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-app
  template:
    metadata:
      labels:
        app: devops-app
    spec:
      containers:
        - name: devops-app
          image: nginx:1.26
          ports:
            - containerPort: 80

  strategy:
    blueGreen:
      activeService: devops-app
      previewService: devops-app-preview
      autoPromotionEnabled: false