replicaCount: 3

image:
  repository: maksimmenshikh/devops-info-service
  tag: "latest"

service:
  type: NodePort
  port: 80
  targetPort: 5000

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 10
  periodSeconds: 5

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 3

secrets:
  username: "admin"
  password: "changeme"